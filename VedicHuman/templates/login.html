<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Vedic Human – Login</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: "Poppins", sans-serif;
}

/* BACKGROUND */
body {
    height: 100vh;
    background: url("{{ url_for('static', filename='yoga2.jpeg') }}") center/cover no-repeat;
    display: flex;
    align-items: center;
    justify-content: center;
}

/* OVERLAY */
body::before {
    content: "";
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, rgba(0,0,0,0.7), rgba(30,92,42,0.6));
    backdrop-filter: blur(6px);
}

/* MAIN CARD */
.container {
    position: relative;
    width: 900px;
    height: 550px;
    display: flex;
    border-radius: 24px;
    overflow: hidden;
    box-shadow: 0 30px 80px rgba(0,0,0,0.4);
    animation: fadeIn 0.8s ease;
}

/* ANIMATION */
@keyframes fadeIn {
    from { opacity: 0; transform: translateY(40px); }
    to { opacity: 1; transform: translateY(0); }
}

/* LEFT SIDE */
.left {
    flex: 1;
    background: url("{{ url_for('static', filename='yoga2.jpeg') }}") center/cover no-repeat;
    padding: 50px;
    color: white;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
}

.logo {
    font-size: 22px;
    font-weight: bold;
}

.quote {
    font-size: 28px;
    line-height: 1.4;
    font-weight: 500;
}

.quote span {
    color: #7fffb0;
}

/* RIGHT SIDE */
.right {
    flex: 1;
    background: rgba(255,255,255,0.08);
    backdrop-filter: blur(20px);
    padding: 60px;
    display: flex;
    flex-direction: column;
    justify-content: center;
}

/* TITLE */
h2 {
    font-size: 30px;
    color: white;
    margin-bottom: 10px;
}

p {
    color: #ccc;
    margin-bottom: 25px;
}

/* INPUT */
.input-group {
    position: relative;
    margin-bottom: 20px;
}

input {
    width: 100%;
    padding: 14px;
    border-radius: 10px;
    border: none;
    outline: none;
    background: rgba(255,255,255,0.15);
    color: white;
}

input::placeholder {
    color: #ddd;
}

/* BUTTON */
button {
    padding: 14px;
    border-radius: 10px;
    border: none;
    background: linear-gradient(135deg, #2e8b57, #4fd98c);
    color: white;
    font-size: 15px;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    transform: translateY(-2px) scale(1.02);
    box-shadow: 0 12px 30px rgba(79,217,140,0.5);
}

/* SIGNUP */
.signup {
    margin-top: 20px;
    text-align: center;
    font-size: 13px;
    color: #ccc;
}

.signup a {
    color: #7fffb0;
    font-weight: bold;
    text-decoration: none;
}

.signup a:hover {
    text-decoration: underline;
}

/* MOBILE */
@media (max-width: 900px) {
    .container {
        flex-direction: column;
        height: auto;
        width: 90%;
    }

    .left {
        display: none;
    }
}
</style>
</head>

<body>

<div class="container">

    <!-- LEFT -->
    <div class="left">
        <div class="logo">Vedic Human - Yoga At Ease</div>
        <div class="quote">
            Transform your body,<br>
            calm your <span>mind</span> 🧘
        </div>
    </div>

    <!-- RIGHT -->
    <div class="right">
        <h2>Welcome Back</h2>
        <p>Login to continue your journey</p>

        <div class="input-group">
            <input type="email" id="email" placeholder="Email">
        </div>

        <div class="input-group">
            <input type="password" id="password" placeholder="Password">
        </div>

        <button onclick="loginUser()">Login</button>

        <div class="signup">
            Don’t have an account?<br>
            <a href="/signup">Create Account</a>
        </div>
    </div>

</div>

<script>
function loginUser() {
    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;

    if (email === "" || password === "") {
        alert("Please fill all fields");
        return;
    }

    fetch("/login", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({
            email: email,
            password: password
        })
    })
    .then(res => res.json())
    .then(data => {
        if (data.success) {
            window.location.href = "/dashboard";
        } else {
            alert("Invalid email or password");
        }
    })
    .catch(() => {
        alert("Server error");
    });
}
</script>

</body>
</html>
