<!DOCTYPE html>
<html>
<head>
<title>Yoga Session</title>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/pose-detection"></script>
<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #eef2ec;
}
.header {
  padding: 20px 40px;
  background: #f5f7f4;
  border-bottom: 1px solid #ddd;
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.header h2 { margin: 0; color: #2f7d57; }
.header select {
  padding: 8px 14px;
  border-radius: 8px;
  border: 1px solid #ccc;
  font-size: 15px;
  cursor: pointer;
}
.container {
  display: flex;
  gap: 30px;
  padding: 40px;
  align-items: flex-start;
}
.left-col {
  flex: 2;
  display: flex;
  flex-direction: column;
  gap: 20px;
}
.camera-box {
  background: white;
  padding: 20px;
  border-radius: 12px;
  box-shadow: 0 5px 15px rgba(0,0,0,0.05);
  text-align: center;
}
#camera-area {
  display: none;
  position: relative;
  margin-bottom: 15px;
}
#camera-area video {
  border-radius: 10px;
  width: 100%;
  max-height: 480px;
  object-fit: cover;
}
#camera-area canvas {
  position: absolute;
  top: 0; left: 0;
  width: 100%; height: 100%;
  border-radius: 10px;
}
#timer-box {
  display: none;
  margin-top: 15px;
  padding: 12px;
  background: #f5f7f4;
  border-radius: 10px;
}
#pose-status {
  font-size: 18px;
  font-weight: bold;
  margin-bottom: 6px;
}
.timer-row {
  display: flex;
  justify-content: center;
  gap: 40px;
  font-size: 16px;
  font-weight: bold;
}
.instructions {
  background: white;
  padding: 25px;
  border-radius: 12px;
  box-shadow: 0 5px 15px rgba(0,0,0,0.05);
}
.instructions h3 { margin-top: 0; color: #2f7d57; }
.instructions ul { line-height: 1.8; margin: 0; padding-left: 20px; }
.btn {
  background: #3d8b62;
  color: white;
  padding: 12px 28px;
  border: none;
  border-radius: 8px;
  cursor: pointer;
  font-size: 16px;
}
.btn:hover { background: #2f6f50; }
button:hover { background: #245f43 !important; }
.btn-stop { background: #c0392b; margin-left: 10px; }
.btn-stop:hover { background: #a93226 !important; }
.image-box {
  flex: 1;
  background: white;
  padding: 20px;
  border-radius: 12px;
  box-shadow: 0 5px 15px rgba(0,0,0,0.05);
  text-align: center;
  position: sticky;
  top: 20px;
}
.image-box img { width: 100%; border-radius: 10px; }
.image-box p { margin-top: 10px; font-weight: bold; color: #2f7d57; font-size: 15px; }
</style>
</head>
<body>

<div class="header">
  <div style="display:flex; align-items:center; gap:15px;">
    <button onclick="window.location.href='/dashboard'" style="
      display:flex; align-items:center; gap:8px;
      background:#2f7d57; color:white;
      border:none; border-radius:8px;
      padding:8px 16px; cursor:pointer;
      font-size:14px; font-weight:bold;
      transition: background 0.2s;">
      ← Back
    </button>
    <h2 style="margin:0;">🌿 Yoga Session</h2>
  </div>
  <select id="pose-select" onchange="changePose()">
    <option value="namaste">Namaste Pose</option>
    <option value="tree">Tree Pose</option>
    <option value="warrior">Warrior Pose</option>
    <option value="mountain">Mountain Pose</option>
  </select>
</div>

<div class="container">
  <div class="left-col">

    <!-- Camera -->
    <div class="camera-box">
      <div id="camera-area">
        <video id="video" autoplay playsinline></video>
        <canvas id="canvas"></canvas>
      </div>

      <div id="timer-box">
        <div id="pose-status">Detecting...</div>
        <div class="timer-row">
          <span>⏱ Hold Time: <span id="hold-timer">0.0s</span></span>
          <span>🏆 Best Time: <span id="best-timer">0.0s</span></span>
        </div>
      </div>

      <div style="margin-top:15px;">
        <button class="btn" id="start-btn" onclick="startPose()">▶️ Start Pose</button>
        <button class="btn btn-stop" id="stop-btn" style="display:none;" onclick="stopCamera()">⏹ Stop Camera</button>
      </div>
    </div>

    <!-- Instructions -->
    <div class="instructions">
      <h3>📋 Instructions</h3>
      <ul id="instruction-list"></ul>
    </div>

  </div>

  <!-- Reference Image -->
  <div class="image-box">
    <img id="pose-img" src="">
    <p id="pose-label"></p>
  </div>
</div>

<script>
// ─── POSE DATA ───────────────────────────────────────────────
const POSES = {
  namaste: {
    label: "Namaste Pose",
    image: "/static/yoga.jpg",
    instructions: [
      "Stand straight with feet together.",
      "Join both hands at chest level in prayer position.",
      "Keep elbows slightly bent and relaxed.",
      "Close your eyes and breathe slowly.",
      "Hold the pose and stay balanced."
    ]
  },
  tree: {
    label: "Tree Pose",
    image: "/static/tree.jpg",
    instructions: [
      "Stand straight with feet together.",
      "Shift weight to one leg.",
      "Place the other foot on your inner thigh.",
      "Join hands in prayer position at chest.",
      "Hold the pose and breathe slowly."
    ]
  },
  warrior: {
    label: "Warrior Pose",
    image: "/static/Warrior.jpeg",
    instructions: [
      "Stand with feet wide apart.",
      "Turn front foot 90° and back foot slightly inward.",
      "Bend front knee to 90°, keep back leg straight.",
      "Stretch both arms horizontally at shoulder height.",
      "Keep torso upright and gaze forward."
    ]
  },
  mountain: {
    label: "Mountain Pose (Arms Up)",
    image: "/static/Mountain.jpeg",
    instructions: [
      "Stand straight with feet together.",
      "Keep both legs fully straight.",
      "Raise both arms straight above your head.",
      "Join palms together above head.",
      "Keep body upright and breathe steadily."
    ]
  }
};

// ─── STATE ───────────────────────────────────────────────────
let detector, video, canvas, ctx, stream;
let animationId = null;
let currentPose = "namaste";
let holdStart   = null;
let holdTime    = 0;
let bestTime    = 0;

// ─── INIT ────────────────────────────────────────────────────
window.onload = () => {
  video  = document.getElementById("video");
  canvas = document.getElementById("canvas");
  ctx    = canvas.getContext("2d");
  // dropdown ki value se load karo — hardcoded nahi
  currentPose = document.getElementById("pose-select").value;
  loadPoseUI(currentPose);
};

function changePose() {
  currentPose = document.getElementById("pose-select").value;
  loadPoseUI(currentPose);
  holdStart = null;
  holdTime  = 0;
  bestTime  = 0;
  document.getElementById("hold-timer").textContent = "0.0s";
  document.getElementById("best-timer").textContent = "0.0s";
}

function loadPoseUI(key) {
  const p = POSES[key];
  document.getElementById("pose-img").src            = p.image;
  document.getElementById("pose-label").textContent  = p.label;
  const ul = document.getElementById("instruction-list");
  ul.innerHTML = p.instructions.map(i => `<li>${i}</li>`).join("");
}

// ─── CAMERA ──────────────────────────────────────────────────
async function startPose() {
  document.getElementById("start-btn").textContent = "⏳ Loading model...";
  document.getElementById("start-btn").disabled    = true;

  document.getElementById("camera-area").style.display = "block";
  document.getElementById("timer-box").style.display   = "block";

  stream = await navigator.mediaDevices.getUserMedia({ video: { width: 1280, height: 720 } });
  video.srcObject = stream;
  video.onloadedmetadata = () => {
    canvas.width  = video.videoWidth;
    canvas.height = video.videoHeight;
  };

  const model = poseDetection.SupportedModels.MoveNet;
  detector = await poseDetection.createDetector(model, {
    modelType: poseDetection.movenet.modelType.SINGLEPOSE_LIGHTNING
  });

  // model load hone ke baad button reset karo
  document.getElementById("start-btn").textContent = "▶️ Start Pose";
  document.getElementById("start-btn").disabled    = false;
  document.getElementById("start-btn").style.display = "none";
  document.getElementById("stop-btn").style.display  = "inline-block";

  detectPose();
}

// ─── SESSION UPDATE ──────────────────────────────────────────
function startSession() {
  fetch("/start-session", {
    method: "POST",
    credentials: "include"  // Flask session cookie bhejna zaroori
  })
  .then(res => res.json())
  .then(data => {
    if (data.success) {
      alert("Great job! Session Completed ✅");
      window.location.href = "/dashboard";  // automatically dashboard pe redirect
    }
  })
  .catch(err => {
    console.error("Session update failed:", err);
    window.location.href = "/dashboard";  // error pe bhi dashboard pe bhejo
  });
}

// ─── STOP CAMERA ─────────────────────────────────────────────
function stopCamera() {
  if (animationId) { cancelAnimationFrame(animationId); animationId = null; }
  if (video)  { video.pause(); video.srcObject = null; }
  if (stream) { stream.getTracks().forEach(t => t.stop()); stream = null; }
  if (ctx)    { ctx.clearRect(0, 0, canvas.width, canvas.height); }

  document.getElementById("camera-area").style.display = "none";
  document.getElementById("timer-box").style.display   = "none";
  document.getElementById("start-btn").style.display   = "inline-block";
  document.getElementById("stop-btn").style.display    = "none";

  // DB update + redirect
  startSession();
}

// ─── ANGLE HELPER ────────────────────────────────────────────
function getAngle(A, B, C) {
  const AB = { x: A.x - B.x, y: A.y - B.y };
  const CB = { x: C.x - B.x, y: C.y - B.y };
  const dot = AB.x * CB.x + AB.y * CB.y;
  const mag = Math.sqrt((AB.x**2 + AB.y**2)) * Math.sqrt((CB.x**2 + CB.y**2));
  return Math.acos(Math.min(Math.max(dot / mag, -1), 1)) * (180 / Math.PI);
}

// ─── POSE CHECKERS ───────────────────────────────────────────
function checkNamaste(kp) {
  const lShoulder=kp[5], rShoulder=kp[6];
  const lWrist=kp[9], rWrist=kp[10];

  if ([lShoulder, rShoulder, lWrist, rWrist]
      .some(p => p.score < 0.4)) return false;

  const chestY        = (lShoulder.y + rShoulder.y) / 2;
  const estimatedHipY = chestY + 200;  // hips visible na ho toh estimate

  const wristsAtChest = lWrist.y > chestY && lWrist.y < estimatedHipY &&
                        rWrist.y > chestY && rWrist.y < estimatedHipY;

  return wristsAtChest;
}

function checkTree(kp) {
  const lHip=kp[11], rHip=kp[12], lKnee=kp[13], rKnee=kp[14];
  const lAnkle=kp[15], rAnkle=kp[16];
  const lShoulder=kp[5], rShoulder=kp[6], lWrist=kp[9], rWrist=kp[10];

  if ([lHip,rHip,lKnee,rKnee,lAnkle,rAnkle,lShoulder,rShoulder,lWrist,rWrist]
      .some(p => p.score < 0.4)) return false;

  const leftKneeAngle  = getAngle(lHip, lKnee, lAnkle);
  const rightKneeAngle = getAngle(rHip, rKnee, rAnkle);
  const oneLegBent       = leftKneeAngle < 120 || rightKneeAngle < 120;
  const standingStraight = leftKneeAngle > 155 || rightKneeAngle > 155;

  const chestY = (lShoulder.y + rShoulder.y) / 2;
  const hipY   = (lHip.y + rHip.y) / 2;
  const wristsAtChest = lWrist.y > chestY && lWrist.y < hipY &&
                        rWrist.y > chestY && rWrist.y < hipY;

  return oneLegBent && standingStraight && wristsAtChest;
}

function checkWarrior(kp) {
  const lHip=kp[11], rHip=kp[12], lKnee=kp[13], rKnee=kp[14];
  const lAnkle=kp[15], rAnkle=kp[16];
  const lShoulder=kp[5], rShoulder=kp[6], lWrist=kp[9], rWrist=kp[10];

  if ([lHip,rHip,lKnee,rKnee,lAnkle,rAnkle,lShoulder,rShoulder,lWrist,rWrist]
      .some(p => p.score < 0.4)) return false;

  const leftKneeAngle  = getAngle(lHip, lKnee, lAnkle);
  const rightKneeAngle = getAngle(rHip, rKnee, rAnkle);
  const frontKneeBent   = (leftKneeAngle > 70 && leftKneeAngle < 125) ||
                          (rightKneeAngle > 70 && rightKneeAngle < 125);
  const backLegStraight = leftKneeAngle > 150 || rightKneeAngle > 150;

  const shoulderY    = (lShoulder.y + rShoulder.y) / 2;
  const armsOut      = Math.abs(lWrist.y - shoulderY) < 80 &&
                       Math.abs(rWrist.y - shoulderY) < 80;
  const shoulderWidth = Math.abs(lShoulder.x - rShoulder.x);
  const armsWide     = Math.abs(lWrist.x - rWrist.x) > shoulderWidth * 1.8;

  return frontKneeBent && backLegStraight && armsOut && armsWide;
}

function checkMountain(kp) {
  const lShoulder=kp[5], rShoulder=kp[6];
  const lHip=kp[11], rHip=kp[12], lKnee=kp[13], rKnee=kp[14];
  const lAnkle=kp[15], rAnkle=kp[16], lWrist=kp[9], rWrist=kp[10];

  if ([lShoulder,rShoulder,lHip,rHip,lKnee,rKnee,lAnkle,rAnkle,lWrist,rWrist]
      .some(p => p.score < 0.4)) return false;

  const leftKneeAngle  = getAngle(lHip, lKnee, lAnkle);
  const rightKneeAngle = getAngle(rHip, rKnee, rAnkle);
  const legsStraight   = leftKneeAngle > 160 && rightKneeAngle > 160;
  const wristsUp       = lWrist.y < lShoulder.y && rWrist.y < rShoulder.y;
  const wristsTogether = Math.abs(lWrist.x - rWrist.x) < 100;

  return legsStraight && wristsUp && wristsTogether;
}

function isPoseCorrect(kp) {
  if (currentPose === "namaste") return checkNamaste(kp);
  if (currentPose === "tree")    return checkTree(kp);
  if (currentPose === "warrior") return checkWarrior(kp);
  if (currentPose === "mountain")return checkMountain(kp);
  return false;
}

// ─── SKELETON DRAWING ────────────────────────────────────────
const CONNECTIONS = [
  [5,6],[5,7],[7,9],[6,8],[8,10],
  [5,11],[6,12],[11,12],
  [11,13],[13,15],[12,14],[14,16]
];

function drawSkeleton(kp, color) {
  ctx.strokeStyle = color;
  ctx.lineWidth   = 4;
  CONNECTIONS.forEach(([a, b]) => {
    if (kp[a].score > 0.4 && kp[b].score > 0.4) {
      ctx.beginPath();
      ctx.moveTo(kp[a].x, kp[a].y);
      ctx.lineTo(kp[b].x, kp[b].y);
      ctx.stroke();
    }
  });
  kp.forEach(point => {
    if (point.score > 0.4) {
      ctx.beginPath();
      ctx.arc(point.x, point.y, 6, 0, 2 * Math.PI);
      ctx.fillStyle   = color;
      ctx.fill();
      ctx.strokeStyle = "white";
      ctx.lineWidth   = 2;
      ctx.stroke();
    }
  });
}

// ─── DETECTION LOOP ──────────────────────────────────────────
async function detectPose() {
  if (!detector || !video || video.readyState < 2) {
    animationId = requestAnimationFrame(detectPose);
    return;
  }

  const poses = await detector.estimatePoses(video);
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  if (poses.length > 0) {
    const kp      = poses[0].keypoints;
    const correct = isPoseCorrect(kp);
    const color   = correct ? "#00e676" : "#ff1744";
    drawSkeleton(kp, color);

    const now = performance.now();
    if (correct) {
      if (!holdStart) holdStart = now;
      holdTime = (now - holdStart) / 1000;
      if (holdTime > bestTime) bestTime = holdTime;
      document.getElementById("pose-status").style.color   = "#2f7d57";
      document.getElementById("pose-status").textContent   = "✅ Pose Correct! Keep holding...";
    } else {
      holdStart = null;
      holdTime  = 0;
      document.getElementById("pose-status").style.color   = "#c0392b";
      document.getElementById("pose-status").textContent   = "❌ Adjust your pose...";
    }

    document.getElementById("hold-timer").textContent = holdTime.toFixed(1) + "s";
    document.getElementById("best-timer").textContent = bestTime.toFixed(1) + "s";
  }

  animationId = requestAnimationFrame(detectPose);
}
</script>
</body>
</html>
