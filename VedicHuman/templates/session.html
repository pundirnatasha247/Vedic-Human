<!DOCTYPE html>
<html>
<head>
<title>Yoga Session</title>

<style>

body{
margin:0;
font-family:Arial, sans-serif;
background:#eef2ec;
}

/* Header */

.header{
padding:20px 40px;
background:#f5f7f4;
border-bottom:1px solid #ddd;
display:flex;
justify-content:space-between;
align-items:center;
}

.header h2{
margin:0;
color:#2f7d57;
}

/* Container */

.container{
display:flex;
gap:30px;
padding:40px;
}

/* Left box */

.instructions{
flex:2;
background:white;
padding:25px;
border-radius:12px;
box-shadow:0 5px 15px rgba(0,0,0,0.05);
}

.instructions ul{
line-height:1.6;
}

/* Right box */

.image-box{
flex:1;
background:white;
padding:20px;
border-radius:12px;
box-shadow:0 5px 15px rgba(0,0,0,0.05);
text-align:center;
}

.image-box img{
width:100%;
border-radius:10px;
}

/* Button */

.btn{
margin-top:30px;
background:#3d8b62;
color:white;
padding:12px 20px;
border:none;
border-radius:8px;
cursor:pointer;
font-size:16px;
}

.btn:hover{
background:#2f6f50;
}

.center{
text-align:center;
}

</style>
</head>


<body>

<!-- Header -->

<div class="header">
<h2>🌿 Yoga Session</h2>

<select>
<option>Tree Pose</option>
<option>Warrior Pose</option>
<option>Mountain Pose</option>
</select>
</div>


<!-- Content -->

<div class="container">

<!-- Instructions -->

<div class="instructions">

<ul>
<li>Start in mountain pose with both feet grounded and balanced.</li>

<li>Bend one knee and place your foot on the inner thigh.</li>

<li>Keep your balance and point your knee outward.</li>

<li>Join your hands in prayer position.</li>

<li>Hold the pose and breathe slowly.</li>

</ul>

<div class="center">
<button class="btn">Start Pose</button>
</div>

</div>


<!-- Image -->

<div class="image-box">
    <img src="{{ url_for('static', filename='tree.jpg') }}">
</div>

</div>


</body>
</html>
