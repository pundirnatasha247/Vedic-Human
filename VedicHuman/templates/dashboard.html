<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<title>Yoga Dashboard</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, sans-serif;
}

body{
background:#eef2ec;
display:flex;
height:100vh;
}

/* Sidebar */

.sidebar{
width:220px;
background:#f5f7f4;
padding:25px;
border-right:1px solid #e2e6df;
display:flex;
flex-direction:column;
justify-content:space-between;
}

.logo{
font-size:20px;
font-weight:600;
color:#2f7d57;
margin-bottom:25px;
}

.profile{
margin-bottom:30px;
font-size:15px;
}

.menu a{
display:block;
padding:12px;
margin-bottom:8px;
text-decoration:none;
color:#444;
border-radius:10px;
}

.menu a:hover{
background:#e5efe7;
}

/* Logout */

.logout{
background:#e74c3c;
color:white;
border:none;
padding:10px;
border-radius:8px;
cursor:pointer;
}

.logout:hover{
background:#c0392b;
}

/* Main */

.main{
flex:1;
padding:40px;
}

/* Header */

.header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:40px;
}

.header h1{
font-size:28px;
}

.stats{
color:#666;
}

/* Cards Layout */

.cards{
display:grid;
grid-template-columns:1.5fr 1fr;
gap:25px;
height:75vh;
}

/* Start Session */

.session-card{
background:white;
border-radius:18px;
overflow:hidden;
box-shadow:0 6px 20px rgba(0,0,0,0.05);
height:100%;
display:flex;
flex-direction:column;
}

.session-card img{
width:100%;
height:230px;
object-fit:cover;
}

.session-content{
padding:25px;
flex:1;
display:flex;
flex-direction:column;
justify-content:center;
}

.session-content h2{
margin-bottom:10px;
}

.session-content p{
color:#777;
margin-bottom:20px;
}

.btn{
background:#3d8b62;
color:white;
padding:14px;
border:none;
border-radius:10px;
cursor:pointer;
width:100%;
font-size:16px;
}

.btn:hover{
background:#2f6f50;
}

/* Progress */

.progress-card{
background:white;
border-radius:18px;
padding:25px;
box-shadow:0 6px 20px rgba(0,0,0,0.05);
height:100%;
}

.progress-card h2{
margin-bottom:20px;
}

.progress-item{
margin-bottom:25px;
}

.bar{
background:#e6ece4;
height:10px;
border-radius:10px;
margin-top:8px;
overflow:hidden;
}

.fill{
background:#3d8b62;
height:100%;
}

.view-btn{
margin-top:20px;
width:100%;
background:#f0f5f1;
color:#2f7d57;
border:none;
padding:12px;
border-radius:10px;
cursor:pointer;
}

.view-btn:hover{
background:#e0ece3;
}

</style>
</head>


<body>

<!-- Sidebar -->

<div class="sidebar">

<div>

<div class="logo">🌿 Vedic Human</div>

<div class="profile">
Welcome back, <b>{{name}}</b>
</div>

<div class="menu">
<a href="#">Start Session</a>
<a href="#">Progress</a>
<a href="#">Pose Library</a>
</div>

</div>

<a href="/logout">
<button class="logout">Logout</button>
</a>

</div>


<!-- Main Content -->

<div class="main">

<div class="header">

<h1 id="greeting"></h1>

<div class="stats">
🔥 7 Day Streak • 24 Sessions
</div>

</div>


<div class="cards">

<!-- Start Session -->

<div class="session-card">

<img src="https://images6.alphacoders.com/126/thumb-1920-1263719.jpg">

<div class="session-content">

<h2>Start Session</h2>

<p>Morning Flow • 20 min</p>

<button onclick="window.location.href='/session'">
▶ Begin Practice
</button>

</div>

</div>


<!-- Progress -->

<div class="progress-card">

<h2>Your Progress</h2>

<div class="progress-item">
Sessions This Week (4 / 5)

<div class="bar">
<div class="fill" style="width:80%"></div>
</div>

</div>

<div class="progress-item">
Total Minutes (80 / 100)

<div class="bar">
<div class="fill" style="width:80%"></div>
</div>

</div>

<div class="progress-item">
🔥 Current Streak: 7 days
</div>

<button class="view-btn">
View More →
</button>

</div>

</div>

</div>


<script>

/* Greeting based on time */

const hour = new Date().getHours();
let greeting = "Hello";

if(hour < 12) greeting = "Good Morning";
else if(hour < 18) greeting = "Good Afternoon";
else greeting = "Good Evening";

document.getElementById("greeting").innerText =
greeting + ", {{name}} ";

</script>

</body>
</html>
