<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Yoga Dashboard</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI';}

body{
display:flex;
background:#eef2ec;
transition:0.3s;
}

/* DARK MODE */
body.dark{
background:#121212;
color:#eee;
}

/* SIDEBAR */
.sidebar{
width:230px;
background:#f5f7f4;
padding:20px;
border-right:1px solid #ddd;
display:flex;
flex-direction:column;
justify-content:space-between;
height:100vh;
transition:0.3s;
}

body.dark .sidebar{background:#1e1e1e;}

.sidebar.collapsed{width:80px;}
.sidebar.collapsed span,
.sidebar.collapsed .logo{display:none;}
.sidebar.collapsed .nav-link{justify-content:center;}

.sidebar-top{
display:flex;
justify-content:space-between;
margin-bottom:20px;
cursor:pointer;
}

.logo{font-weight:bold;color:#2f7d57;}

.nav-link{
display:flex;
gap:10px;
padding:12px;
margin:8px 0;
text-decoration:none;
color:#444;
border-radius:10px;
}

.nav-link:hover{background:#e8f5ee;}

.nav-link.active{
background:#dff3ea;
font-weight:bold;
}

body.dark .nav-link{color:#eee;}
body.dark .nav-link.active{background:#2a2a2a;}

.logout{
background:#e74c3c;
color:white;
border:none;
padding:12px;
border-radius:10px;
cursor:pointer;
width:100%;
}

/* MAIN */
.main{flex:1;padding:30px;}

.header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:20px;
}

.header button{
border:none;
padding:10px;
border-radius:10px;
cursor:pointer;
background:#eee;
}

body.dark .header button{
background:#2a2a2a;
color:white;
}

.intro{
background:white;
padding:15px;
border-radius:10px;
margin-bottom:20px;
}

body.dark .intro{background:#1f1f1f;}

.cards{
display:grid;
grid-template-columns:2fr 1fr;
gap:20px;
}

.card{
background:white;
padding:20px;
border-radius:12px;
}

body.dark .card{background:#1f1f1f;}

.sidebar {
    width: 250px;
    transition: all 0.3s ease;
}

.sidebar.collapsed {
    width: 70px;
}

.sidebar.collapsed span {
    display: none;
}

/* SESSION */
.session-img{
width:100%;
height:200px;
border-radius:10px;
object-fit:cover;
margin-bottom:10px;
}

.session-box{
display:flex;
justify-content:space-between;
align-items:center;
}

.start-btn{
background:#3d8b62;
color:white;
border:none;
padding:10px 20px;
border-radius:20px;
cursor:pointer;
}

/* CALENDAR */
#calendar{
display:grid;
grid-template-columns:repeat(7,1fr);
gap:8px;
margin-top:10px;
}

.day{
width:34px;
height:34px;
border-radius:8px;
background:#ddd;
display:flex;
align-items:center;
justify-content:center;
font-size:12px;
color:#555;
}

.day.active{
background:#3d8b62;
color:white;
font-weight:bold;
}

#monthLabel{
font-size:14px;
color:#777;
margin-bottom:8px;
}
</style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">

<div>
<div class="sidebar-top">
<div onclick="toggleSidebar()">☰</div>
<div class="logo">🌿 Vedic Human</div>
</div>

<div>
<a href="/session" class="nav-link">🧘 <span>Session</span></a>
<a href="/dashboard" class="nav-link">📊 <span>Progress</span></a>
<a href="/library" class="nav-link">📚 <span>Library</span></a>
</div>
</div>

<button class="logout" onclick="logoutUser()">Logout</button>

</div>

<!-- MAIN -->
<div class="main">

<div class="header">
<h2 id="greeting"></h2>

<div style="display:flex;gap:10px;">
<button onclick="goToLibrary()">📚 Read</button>
<button onclick="toggleDark()" id="themeToggle">🌙</button>
</div>
</div>

<div class="intro">
Stay consistent. Your journey towards mindfulness begins today.
</div>

<div class="cards">

<!-- LEFT -->
<div class="card">
<img src="{{ url_for('static', filename='dash1.jpeg') }}" class="session-img">

<div class="session-box">
<div>
<h3>Start Your Session</h3>
<p>Relax • Focus • Breathe</p>
</div>
<button class="start-btn" onclick="startSession()">Start</button>
</div>
</div>

<!-- RIGHT -->
<div class="card">
<h3>📅 Your Consistency Calendar</h3>
<div id="monthLabel"></div>
<div id="calendar"></div>
</div>

</div>
</div>

<script>

// SIDEBAR
function toggleSidebar(){
document.querySelector(".sidebar").classList.toggle("collapsed");
}



// LOGOUT
function logoutUser(){
fetch("/logout").then(()=>window.location.href="/");
}

// DARK MODE
function toggleDark(){
let body=document.body;
let btn=document.getElementById("themeToggle");

body.classList.toggle("dark");

if(body.classList.contains("dark")){
btn.innerText="☀️";
localStorage.setItem("theme","dark");
}else{
btn.innerText="🌙";
localStorage.setItem("theme","light");
}
}

// LIBRARY
function goToLibrary(){
window.location.href="/library";
}

// GREETING
let h=new Date().getHours();
let g=h<12?"Good Morning":h<18?"Good Afternoon":"Good Evening";
document.getElementById("greeting").innerText=g+", {{name}}";

// SESSION
function startSession(){
fetch("/start-session",{method:"POST"})
.then(()=>window.location.href="/session");
}

// CALENDAR (FIXED)
function renderCalendar(dates){

let container=document.getElementById("calendar");
let label=document.getElementById("monthLabel");

container.innerHTML="";
if(!dates) dates=[];

let today=new Date();
let year=today.getFullYear();
let month=today.getMonth();

label.innerText=today.toLocaleDateString("en-IN",{month:"long",year:"numeric"});

// first day alignment
let firstDay=new Date(year,month,1).getDay();

// total days
let totalDays=new Date(year,month+1,0).getDate();

// empty boxes
for(let i=0;i<firstDay;i++){
let empty=document.createElement("div");
container.appendChild(empty);
}

// actual days
for(let d=1;d<=totalDays;d++){

let fullDate=new Date(year,month,d).toISOString().split("T")[0];

let el=document.createElement("div");
el.className="day";
el.innerText=d;

if(dates.includes(fullDate)){
el.classList.add("active");
}

container.appendChild(el);
}
}

// LOAD
window.onload=()=>{

// theme
let saved=localStorage.getItem("theme");
if(saved==="dark"){
document.body.classList.add("dark");
document.getElementById("themeToggle").innerText="☀️";
}

// calendar
fetch("/get_dashboard_data")
.then(res=>res.json())
.then(data=>{
renderCalendar(data.dates);
});

// active nav
let path=window.location.pathname;
document.querySelectorAll(".nav-link").forEach(link=>{
if(link.getAttribute("href")===path){
link.classList.add("active");
}
});
};

</script>

</body>
</html>
